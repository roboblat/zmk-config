# I2C bus, needed to talk to the MCP23008 expander.
CONFIG_I2C=y

# MCP23008 driver: do NOT set CONFIG_GPIO_MCP23XXX here.  In Zephyr 4.x
# that symbol has no prompt and is auto-selected by the presence of a
# `microchip,mcp23008` node in the devicetree.  Assigning it explicitly
# causes a Kconfig hard error ("is assigned in a configuration file,
# but is not directly user-configurable").  The overlay's MCP23008
# node is what turns the driver on.

# USB output — useful while bringing up the right half on its own.
CONFIG_ZMK_USB=y

# ----- Trackpad (currently disabled) -----
# Uncomment these when you uncomment the trackpad node in the overlay
# AND have added the AYM1607 driver module in config/west.yml:
# CONFIG_INPUT=y
# CONFIG_ZMK_POINTING=y

# ----- ZMK Studio (off by default) -----
# Studio needs a physical-layout `keys` property to be useful, which
# this shield doesn't yet have. Enable when you fill that in:
# CONFIG_ZMK_STUDIO=y
