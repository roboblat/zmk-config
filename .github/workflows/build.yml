on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    strategy:
      matrix:
        board: [xiao_ble]
        shield: [ergo_left, ergo_right]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build
        run: west build -p -b ${{ matrix.board }} -- -DSHIELD="${{ matrix.shield }}" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
